# Ground-truth eval set for SimpleRAGx Phase 1 RAGAS baseline.
# Source: FinanceBench (PatronusAI/financebench) — human-verified Q&A pairs.
# Documents: AMD FY2022 10-K, Boeing FY2022 10-K (real SEC filings).
# Each answer and evidence snippet is verbatim from FinanceBench ground truth.

questions:

  # ── AMD FY2022 10-K (financebench_id_00995) ──────────────────────────────
  - id: amd_01
    question: "What are the major products and services that AMD sells as of FY22?"
    expected_answer: >
      AMD sells server microprocessors (CPUs) and graphics processing units (GPUs),
      data processing units (DPUs), Field Programmable Gate Arrays (FPGAs), and Adaptive
      System-on-Chip (SoC) products for data centers; CPUs, accelerated processing units
      (APUs) that integrate CPUs and GPUs, and chipsets for desktop and notebook personal
      computers; discrete GPUs, and semi-custom SoC products and development services;
      and embedded CPUs, GPUs, APUs, FPGAs, and Adaptive SoC products.
    expected_contexts:
      - "server microprocessors"
      - "GPUs"
      - "FPGAs"
      - "Adaptive System-on-Chip"
      - "semi-custom"

  # ── AMD FY2022 10-K (financebench_id_01198) ──────────────────────────────
  - id: amd_02
    question: "What drove revenue change as of the FY22 for AMD?"
    expected_answer: >
      In 2022, AMD reported higher sales of their EPYC server processors, higher
      semi-custom product sales, and the inclusion of Xilinx embedded product sales.
    expected_contexts:
      - "EPYC"
      - "semi-custom"
      - "Xilinx"
      - "23.6 billion"
      - "44%"

  # ── AMD FY2022 10-K (financebench_id_00917) ──────────────────────────────
  - id: amd_03
    question: "What drove operating margin change as of FY22 for AMD?"
    expected_answer: >
      The decrease in AMD's operating income was primarily driven by amortization of
      intangible assets associated with the Xilinx acquisition.
    expected_contexts:
      - "amortization"
      - "intangible assets"
      - "Xilinx"
      - "operating income"

  # ── AMD FY2022 10-K (financebench_id_01279) ──────────────────────────────
  - id: amd_04
    question: "Among operations, investing, and financing activities, which brought in the most cash flow for AMD in FY22?"
    expected_answer: >
      In 2022, AMD brought in the most cash flow from Operations.
    expected_contexts:
      - "cash flows from operating"
      - "Cash flows"
      - "investing"
      - "financing"

  # ── AMD FY2022 10-K (financebench_id_00222) ──────────────────────────────
  - id: amd_05
    question: "Does AMD have a reasonably healthy liquidity profile based on its quick ratio for FY22?"
    expected_answer: >
      Yes. The quick ratio is 1.57, calculated as (cash and cash equivalents + short-term
      investments + accounts receivable, net + receivables from related parties) divided by
      current liabilities.
    expected_contexts:
      - "quick ratio"
      - "cash and cash equivalents"
      - "current liabilities"
      - "4,835"

  # ── AMD FY2022 10-K (financebench_id_00563) ──────────────────────────────
  - id: amd_06
    question: "From FY21 to FY22, excluding Embedded, in which AMD reporting segment did sales proportionally increase the most?"
    expected_answer: >
      Data Center segment had the highest proportional revenue increase, growing from
      $3,694 million in FY21 to $6,043 million in FY22.
    expected_contexts:
      - "Data Center"
      - "6,043"
      - "3,694"
      - "Client"
      - "Gaming"

  # ── AMD FY2022 10-K (financebench_id_00757) ──────────────────────────────
  - id: amd_07
    question: "Did AMD report customer concentration in FY22?"
    expected_answer: >
      Yes, one customer accounted for 16% of consolidated net revenue. Sales to this
      customer consisted of products from the Gaming segment.
    expected_contexts:
      - "16%"
      - "consolidated net revenue"
      - "Gaming segment"
      - "customer"

  # ── Boeing FY2022 10-K (financebench_id_00517) ───────────────────────────
  - id: boeing_01
    question: "Are there any product or service categories that represent more than 20% of Boeing's revenue for FY2022?"
    expected_answer: >
      Yes. Commercial Airplanes comprises 39% of total revenue, Defense comprises 35%,
      and Services comprises 26%. All three exceed 20%.
    expected_contexts:
      - "Commercial Airplanes"
      - "39%"
      - "Defence"
      - "35%"
      - "Services"

  # ── Boeing FY2022 10-K (financebench_id_01091) ───────────────────────────
  - id: boeing_02
    question: "Has Boeing reported any materially important ongoing legal battles from FY2022?"
    expected_answer: >
      Yes. Multiple lawsuits have been filed against Boeing resulting from the October 2018
      Lion Air Flight 610 crash and the March 2019 Ethiopian Airlines crash.
    expected_contexts:
      - "Lion Air"
      - "Ethiopian Airlines"
      - "legal"
      - "2018"
      - "2019"

  # ── Boeing FY2022 10-K (financebench_id_00678) ───────────────────────────
  - id: boeing_03
    question: "Does Boeing have an improving gross margin profile as of FY2022?"
    expected_answer: >
      Yes. Gross profit improved from $3,017 million in FY2021 to $3,502 million in FY2022.
      Gross margin percentage improved from 4.8% in FY2021 to 5.3% in FY2022.
    expected_contexts:
      - "gross profit"
      - "3,502"
      - "3,017"
      - "4.8%"
      - "5.3%"

  # ── Boeing FY2022 10-K (financebench_id_01290) ───────────────────────────
  - id: boeing_04
    question: "Who are the primary customers of Boeing as of FY2022?"
    expected_answer: >
      Boeing's primary customers are a limited number of commercial airlines and the US
      government. The US government accounted for 40% of Boeing's total revenues in FY2022.
    expected_contexts:
      - "commercial airlines"
      - "US government"
      - "40%"
      - "revenues"

  # ── Boeing FY2022 10-K (financebench_id_00464) ───────────────────────────
  - id: boeing_05
    question: "Is Boeing's business subject to cyclicality?"
    expected_answer: >
      Yes. Boeing's business is subject to cyclicality due to its exposure to the airline
      industry, which is a cyclical and highly competitive industry.
    expected_contexts:
      - "cyclical"
      - "airline industry"
      - "competitive"

  # ── Boeing FY2022 10-K (financebench_id_00494) ───────────────────────────
  - id: boeing_06
    question: "What production rate changes is Boeing forecasting for FY2023?"
    expected_answer: >
      Boeing forecasts an increase in production rates for the 737, 777X, and 787 aircraft
      in 2023.
    expected_contexts:
      - "737"
      - "777X"
      - "787"
      - "production rate"

  # ── Boeing FY2022 10-K (financebench_id_00585) ───────────────────────────
  - id: boeing_07
    question: "How does Boeing's effective tax rate in FY2022 compare to FY2021?"
    expected_answer: >
      Effective tax rate in FY2022 was 0.62%, compared to -14.76% in FY2021.
    expected_contexts:
      - "effective tax rate"
      - "0.62"
      - "-14.76"
      - "FY2021"
