# Ground-truth eval set for SimpleRAGx Phase 1 RAGAS baseline.
# Each entry: question, expected_answer (key facts), expected_contexts (snippet keywords).
# Source document: techcorp_q1_2025_report.pdf

questions:

  # ── Simple fact retrieval ────────────────────────────────────────────────
  - id: f01
    question: "Who are the founders of TechCorp and what are their roles?"
    expected_answer: >
      TechCorp was founded by Sarah Chen (CEO) and Michael Rodriguez (CTO).
      Chen has a PhD in Computer Science from Stanford and previously worked at Google.
      Rodriguez previously worked at Tesla and SpaceX.
    expected_contexts:
      - "Sarah Chen"
      - "Michael Rodriguez"
      - "CEO"
      - "CTO"

  - id: f02
    question: "What is TechCorp's Q1 2025 total revenue and year-over-year growth?"
    expected_answer: >
      TechCorp reported total revenue of $231.6M for FY2024, representing 67% year-over-year growth.
    expected_contexts:
      - "231.6"
      - "67%"
      - "revenue"

  - id: f03
    question: "What is the revenue breakdown by product for TechCorp?"
    expected_answer: >
      CloudAI Platform: $148.8M (64%), DataAnalytics Suite: $49.2M (21%),
      SecurityShield Pro: $33.6M (15%).
    expected_contexts:
      - "CloudAI Platform"
      - "DataAnalytics Suite"
      - "SecurityShield Pro"
      - "148.8"

  - id: f04
    question: "What is TechCorp's IPO timeline and target valuation?"
    expected_answer: >
      TechCorp targets an IPO in 2025 with a projected valuation of $5–7 billion.
    expected_contexts:
      - "IPO"
      - "2025"
      - "5"
      - "7B"

  - id: f05
    question: "What are the main risk factors facing TechCorp?"
    expected_answer: >
      Key risks include regulatory compliance (EU AI Act), talent retention, competition from
      AWS/Azure/Google, geopolitical tensions affecting hardware supply, and cybersecurity threats.
    expected_contexts:
      - "risk"
      - "regulatory"
      - "competition"

  # ── Multi-hop / relationship queries ─────────────────────────────────────
  - id: m01
    question: "What strategic partnerships does TechCorp have and what are their financial terms?"
    expected_answer: >
      Microsoft (co-sell, est. $35M incremental ARR by FY2025), Amazon AWS (preferred ML partner,
      75/25 revenue split), NVIDIA (preferred H200 GPU access, 5,000 units at $25K each).
    expected_contexts:
      - "Microsoft"
      - "Amazon"
      - "NVIDIA"
      - "35M"
      - "H200"

  - id: m02
    question: "Who are TechCorp's board members and which firms do they represent?"
    expected_answer: >
      Robert Kim (Sequoia Capital, board chairman), Jennifer Lopez (Andreessen Horowitz),
      Dr. Amanda Foster (independent, former MIT professor), James Thompson (independent, former Intel executive).
    expected_contexts:
      - "Robert Kim"
      - "Sequoia"
      - "Andreessen"
      - "board"

  - id: m03
    question: "What is TechCorp's Series D funding and current cash position?"
    expected_answer: >
      Series D raised $400M led by Tiger Global at a $2.8B valuation in 2023.
      Current cash position is $450M post-Series D.
    expected_contexts:
      - "Series D"
      - "400M"
      - "Tiger Global"
      - "2.8B"
      - "450M"

  # ── Summarisation ─────────────────────────────────────────────────────────
  - id: s01
    question: "Summarise TechCorp's competitive advantages over AWS SageMaker and Google Vertex AI."
    expected_answer: >
      TechCorp claims 3x lower latency and 25% lower cost at scale compared to
      AWS SageMaker and Google Vertex AI for CloudAI Platform workloads.
    expected_contexts:
      - "3x"
      - "25%"
      - "latency"
      - "AWS SageMaker"

  - id: s02
    question: "What are TechCorp's key financial health indicators?"
    expected_answer: >
      Gross margin 72%, LTV:CAC ratio 8.4x, net revenue retention 138%, annual churn 3.2%,
      net loss improving from -$45.1M to -$22.8M.
    expected_contexts:
      - "72%"
      - "8.4x"
      - "138%"
      - "churn"

  # ── Out-of-scope ──────────────────────────────────────────────────────────
  - id: o01
    question: "What is TechCorp's current stock price on NASDAQ?"
    expected_answer: >
      The document does not contain information about TechCorp's stock price;
      the company has not yet completed its IPO.
    expected_contexts:
      - "IPO"

  - id: o02
    question: "Who is the Head of Marketing at TechCorp?"
    expected_answer: >
      The document does not mention a Head of Marketing role at TechCorp.
    expected_contexts: []

  # ── Contradiction / precision ─────────────────────────────────────────────
  - id: c01
    question: "What is TechCorp's Series C funding amount and lead investor?"
    expected_answer: >
      Series C raised $120M led by SoftBank in 2020.
    expected_contexts:
      - "Series C"
      - "120M"
      - "SoftBank"
      - "2020"

  - id: c02
    question: "What is TechCorp's net revenue retention rate?"
    expected_answer: >
      TechCorp's net revenue retention rate is 138%.
    expected_contexts:
      - "138%"
      - "retention"

  - id: c03
    question: "What certifications does SecurityShield Pro hold?"
    expected_answer: >
      SecurityShield Pro is certified under SOC 2 Type II, ISO 27001, and FedRAMP.
    expected_contexts:
      - "SOC 2"
      - "ISO 27001"
      - "FedRAMP"
      - "SecurityShield"
